name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v2.1.1
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      otp-matrix: '["29.0"]'
      enable-ct: true
      enable-ex-doc: true
      enable-hank: true
      enable-audit: true
      audit-ignores: 'GHSA-g2wm-735q-3f56'
      enable-coverage: true
      enable-elp-lint: false
      enable-elp-eqwalize: false
      enable-sbom: true
      enable-sbom-scan: true
      enable-dependency-submission: true
      enable-summary: true
      extra-services-compose: 'docker-compose.ci.yml'
